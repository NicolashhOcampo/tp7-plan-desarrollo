name: Deploy to Firebase Hosting on PR

on: 
  pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 📦 Instalar dependencias
      run: npm ci
    
    - name: 📈 Verificar umbral de cobertura
      run: |
        echo "Verificando tests..."
        npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar dependencias
      run: npm ci

    - name: Lint
      run: |
        echo "Verificando lint..."
        npm run lint

  build_and_preview:
    name: Build and Deploy
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      # Instalar dependencias
      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      # Deploy preview a Firebase Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRUEBA_90CD0 }}
          projectId: prueba-90cd0
