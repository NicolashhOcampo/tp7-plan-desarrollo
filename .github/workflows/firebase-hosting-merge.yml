# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - develop

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Instalar dependencias
      - name: Instalar dependencias
        run: npm ci

      # Ejecutar ESLint
      - name: Lint
        run: npm run lint

      # Ejecutar tests
      - name: Ejecutar tests
        run: npm test

      # Construir la app solo si lint y tests pasaron
      - name: Build
        run: npm run build

      # Deploy a Firebase Hosting solo si build tuvo éxito
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRUEBA_90CD0 }}
          channelId: live
          projectId: prueba-90cd0
