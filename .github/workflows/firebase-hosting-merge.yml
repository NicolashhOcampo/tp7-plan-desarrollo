name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - develop

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 📦 Instalar dependencias
      run: npm ci
    
    - name: 📈 Verificar umbral de cobertura
      run: |
        echo "Verificando tests..."
        npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar dependencias
      run: npm ci

    - name: Lint
      run: |
        echo "Verificando lint..."
        npm run lint

  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      # Instalar dependencias
      - name: Instalar dependencias
        run: npm ci

      # Construir la app solo si lint y tests pasaron
      - name: Build
        run: npm run build

      # Deploy a Firebase Hosting solo si build tuvo éxito
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRUEBA_90CD0 }}
          channelId: live
          projectId: prueba-90cd0
